services:
  db:
    image: postgis/postgis:16-3.4
    container_name: au_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: au
      POSTGRES_PASSWORD: au
      POSTGRES_DB: au
    ports:
      - "5432:5432"
    volumes:
      - au_pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "au", "-d", "au"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  au_pgdata:

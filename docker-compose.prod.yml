name: democracy

services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: au
      POSTGRES_PASSWORD: au
      POSTGRES_DB: au
    volumes:
      - dbdata:/var/lib/postgresql/data
      - ./infra/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "au", "-d", "au"]
      interval: 5s
      timeout: 3s
      retries: 30

  # One-shot init: migrate, seed reference data, fetch + load federal roster,
  # download AEC shapefile + load boundaries. Exits when done. Safe to re-run.
  init:
    build:
      context: .
      dockerfile: infra/init.Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://au:au@db:5432/au
    volumes:
      - boundaries:/repo/data/boundaries

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://au:au@db:5432/au
      EMAIL_TRANSPORT: captured
      # /tmp is always writable; captured-mail also logs each message to
      # stdout, which is the primary inspection path.
      CAPTURED_MAIL_DIR: /tmp/captured-mail
      GEOCODER: nominatim
      NEXT_PUBLIC_APP_URL: ${PUBLIC_URL:-http://localhost}
      PORT: "8080"
    expose:
      - "8080"

  # Edge: terminates TLS, auto-fetches Let's Encrypt cert once `SITE_DOMAIN`
  # resolves to this VM. Set SITE_DOMAIN= empty to serve HTTP-only.
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-}
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    ports:
      - "80:80"
      - "443:443"

volumes:
  dbdata:
  boundaries:
  caddydata:
  caddyconfig:
